# Alembic configuration for qjsync's PostgreSQL state store.
#
# The database URL is NOT stored here. migrations/env.py reads it from the
# QJSYNC_DATABASE_URL environment variable (same source as the app), so secrets
# never land in a versioned file. sqlalchemy.url below is only a harmless
# placeholder for tooling that insists on the key being present.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
# Overridden at runtime by env.py from QJSYNC_DATABASE_URL.
sqlalchemy.url = postgresql+psycopg://qjsync:qjsync@localhost:5432/qjsync

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
