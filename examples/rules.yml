# qjsync prioritisation — UNIFIED BAND-SHIFT model.
#
#   final_band = base_band(QDS) + Σ(±N context modifiers), clamped [skip..Highest]
#
# QDS is the trusted base (Qualys already folds RTIs/exposure into it). Context
# modifiers express how OUR risk appetite differs from Qualys's generic default:
# exposure, active exploit and local-only reachability each nudge the band, and
# they STACK. So a mid-QDS detection that is internet-facing AND exploitable rises
# two bands; a Local one drops one. Nothing low-QDS jumps straight to Highest.
#
# Levels: skip < Low < Medium < High < Highest. QDS maps to Highest/High/Medium;
# below `medium` is skip. Low is only reached via a shift.
#
# Secrets (Qualys/Jira creds, DB URL) live in the environment / .env, never here.

version: 1

jira:
  # Dashboard-only mode: set `enabled: false` to make qjsync write the full detection lifecycle
  # (open/fixed/stale) to the state store WITHOUT ever calling Jira. No Jira credentials are then
  # required, `project` is optional, and qjsync-dash reads the state directly. Default: true.
  enabled: true
  # Project key + issue type. Set them literally, or pull from the environment with
  # ${VAR:-default} so the SAME ruleset targets different projects per environment:
  #   export JIRA_PROJECT_KEY=PRODSEC   ->  project resolves to PRODSEC
  # Unset -> the default after ":-" is used. The custom fields this issue type needs
  # are listed in docs/JIRA_SETUP.md (and created by scripts/bootstrap_jira_fields.py).
  project: "${JIRA_PROJECT_KEY:-QVULN}"
  issue_type: "${JIRA_ISSUE_TYPE:-Bug}"
  sticky_resolutions: ["Won't Do", "Won't Fix", "Risk Accepted"]

qualys:
  module: vm
  incremental_overlap_minutes: 30
  # ACS isn't in HLD 2.0; this environment encodes it as tags like "ACS-4".
  asset_criticality_tag_pattern: "ACS-(\\d)"
  query:
    severities: "2-5"
    status: "New,Active,Re-Opened,Fixed"   # Fixed required so remediation closes issues
    show_igs: 0
    show_tags: 1                           # asset_tags (exposure) + ACS tags
    show_qds: 1                            # QDS — the trusted base score
    show_qds_factors: 1                    # RTIs (active-exploit modifier + top-RTI label)
    truncation_limit: 1000

drift:
  below_threshold: keep_open

purge:
  agent_grace_syncs: 2
  network_scan_grace_days: 30
  require_full_sync: true
  reevaluate_on_return: true

primary_key:
  port_sentinel: "none"
  include_unique_vuln_id: false

logging:
  level: INFO
  format: json

prioritization:
  # Base band straight from QDS. Below `medium` -> skip. floor=60 (50/60 don't
  # change volume — the floor only redistributes priority; see dry-run). 70 is
  # forbidden: it collides with `high` and collapses the Medium band.
  qds_bands:
    highest: 90
    high: 70
    medium: 60

  # Lever B: Highest requires the QDS base to already be High (qds >= high=70).
  # No modifier can manufacture a Highest from a Medium/skip base.
  highest_requires_high_base: true

  # Lever D-narrow: only bands >= Medium become Jira issues. Low is still
  # CLASSIFIED (recorded in state) so a later promotion creates the ticket — it
  # just doesn't pollute Jira with low-priority noise. See docs/LIFECYCLE.md.
  materialize_min_band: Medium

  # Noise never reaches Jira (pre-filter -> skip).
  skip_when:
    any:
      - { signal: vuln_type, op: "==", value: "Information" }
      - { signal: is_ignored, op: "==", value: 1 }
      - { signal: is_disabled, op: "==", value: 1 }

  # Context modifiers — each shifts the QDS band by `shift`; they STACK; the result
  # is clamped to [skip, Highest]. Levers B/C keep "Highest" honest; only a modifier
  # with `bypasses_highest_gate` (confirmed in-the-wild exploitation) may reach
  # Highest from a sub-High QDS base. The top RTI and `pci` are surfaced as LABELS by
  # the mapper (visibility), not as band modifiers. Tune weights to your risk appetite.
  modifiers:
    # ── Threat intelligence (strongest real-world signals) ───────────────────────
    - name: actively-attacked       # confirmed in-the-wild / KEV-grade -> "patch now"
      when: { signal: actively_attacked, op: "==", value: true }
      shift: 2
      label: actively-attacked
      bypasses_highest_gate: true   # legitimately reaches Highest regardless of QDS base
    - name: ransomware
      when: { signal: ransomware, op: "==", value: true }
      shift: 2
      label: ransomware
    - name: wormable
      when: { signal: wormable, op: "==", value: true }
      shift: 1
    - name: epss-high               # >=50% predicted exploitation within 30 days
      when: { signal: epss, op: ">=", value: 0.5 }
      shift: 1
    - name: active-exploit          # generic "exploit available" (weaker than the above)
      when: { signal: has_exploit, op: "==", value: true }
      shift: 1

    # ── Exposure / reachability (each caps at High on its own — Lever C) ──────────
    - name: internet-facing
      when: { signal: asset_tags, op: contains, value: "Internet Facing Assets" }
      shift: 1
      label: internet-facing
      caps_at_high: true
    - name: dmz
      when: { signal: asset_tags, op: contains, value: "DMZ" }
      shift: 1
      label: dmz
      caps_at_high: true
    - name: external-surface        # discovered on the external attack surface
      when:
        any:
          - { signal: asset_tags, op: contains, value: "EASM" }
          - { signal: asset_tags, op: contains, value: "Shodan" }
      shift: 1
      label: external-surface
      caps_at_high: true

    # ── Asset / business criticality ─────────────────────────────────────────────
    - name: high-criticality-asset
      when: { signal: asset_criticality, op: ">=", value: 4 }
      shift: 1
    - name: low-criticality-asset
      when: { signal: asset_criticality, op: "<=", value: 1 }
      shift: -1

    # ── SLA / age ────────────────────────────────────────────────────────────────
    - name: sla-overdue             # open beyond the remediation window
      when: { signal: age_days, op: ">=", value: 30 }
      shift: 1
      label: sla-overdue

    # ── Reachability down-weights / compensating controls ────────────────────────
    - name: local-category          # local-only reachability is lower risk
      when: { signal: category, op: "==", value: "Local" }
      shift: -1
    - name: compensating-control    # active EDR/proxy coverage reduces real exposure
      when:
        any:
          - { signal: asset_tags, op: contains, value: "Falcon" }
          - { signal: asset_tags, op: contains, value: "Zscaler" }
      shift: -1

  # Orthogonal context routing (first match wins): send detections to different Jira
  # projects/teams/components by context, WITHOUT affecting priority. Labels add on.
  routing:
    - name: pci-scope               # tag PCI-in-scope findings for the compliance lane
      when: { signal: pci_flag, op: "==", value: true }
      labels: [pci-scope]
    # - name: cloud-team            # example: route a business unit to its own project
    #   when: { signal: asset_tags, op: contains, value: "Cloud" }
    #   project: "CLOUDSEC"
    #   component: "Cloud Platform"
